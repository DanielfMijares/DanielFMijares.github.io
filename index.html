<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Fernando Mijares | Data & Operations</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        :root { 
            --primary: #00f2fe; 
            --secondary: #4facfe; 
            --text-main: #ffffff; 
            --text-muted: #cbd5e1;
            --accent: #10b981;
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            line-height: 1.6; 
            color: var(--text-main); 
            background: #020617; 
            overflow-x: hidden;
        }

        /* --- VIDEO BACKGROUND --- */
        .video-bg {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            object-fit: cover;
            opacity: 0.3; 
        }
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, #020617 100%);
            z-index: -1;
        }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 80px 20px; position: relative; z-index: 1; }
        
        /* Hero Section */
        header { text-align: left; margin-bottom: 60px; }
        h1 { font-size: 4rem; font-weight: 800; line-height: 1.1; margin-bottom: 20px; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        h1 span { background: -webkit-linear-gradient(0deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-subtitle { font-size: 1.15rem; color: var(--text-muted); font-weight: 300; max-width: 850px; margin-bottom: 40px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); text-align: justify; }
        
        /* Glassmorphism Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s ease, border-color 0.4s ease;
        }
        .glass-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 242, 254, 0.4);
        }

        /* Layout Grids */
        .uvp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; margin-bottom: 80px; }
        .uvp-card h3 { color: var(--primary); margin-bottom: 15px; font-size: 1.2rem; }
        
        /* Skills Grid */
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; margin-bottom: 80px; }
        .skill-item { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); padding: 20px; border-radius: 12px; }
        .skill-item h4 { color: #fff; margin-bottom: 8px; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        .skill-item p { font-size: 0.9rem; color: var(--text-muted); }

        h2 { font-size: 2.2rem; margin-bottom: 15px; font-weight: 800; text-align: left; }
        .section-desc { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 30px; }
        
        /* Projects */
        .project-card { margin-bottom: 40px; padding: 0; overflow: hidden; display: flex; flex-direction: column; }
        
        .project-visual {
            width: 100%;
            height: 200px;
            background: url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=2070&auto=format&fit=crop') center/cover;
            border-bottom: 1px solid var(--glass-border);
            position: relative;
        }
        .visual-2 { background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop'); }
        .visual-3 { background-image: url('https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=2070&auto=format&fit=crop'); }

        .project-content { padding: 35px; }
        .project-title { font-size: 1.8rem; color: #fff; font-weight: 800; display: block; margin-bottom: 15px; }
        
        .tech-tags { margin-bottom: 25px; }
        .tech-tag { display: inline-block; background: rgba(79, 172, 254, 0.15); color: var(--primary); padding: 8px 16px; border-radius: 30px; font-size: 0.8rem; margin: 0 10px 10px 0; font-weight: 600; border: 1px solid rgba(0, 242, 254, 0.3); }
        
        .impact-box { background: rgba(16, 185, 129, 0.1); border-left: 4px solid var(--accent); padding: 20px; margin: 25px 0; font-size: 1.05rem; border-radius: 0 12px 12px 0; }
        
        /* Buttons */
        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 20px; align-items: center; }
